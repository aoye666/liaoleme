name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: stable

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create . --platforms android --project-name liaoleme --org com.example

      - name: Patch Android build config
        run: |
          BUILD="${{ github.workspace }}/android/app/build.gradle.kts"

          # 1) 设置 NDK 版本为 27.0.12077973
          sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' "$BUILD"

          # 2) compileOptions 中启用 core library desugaring
          sed -i '/compileOptions {/a\    isCoreLibraryDesugaringEnabled = true' "$BUILD"

          # 3) 用 Python 在 android block 的末尾、顶层 dependencies 前插入 desugar 依赖
          python3 -c "
import re
with open('$BUILD', 'r') as f:
    content = f.read()

# 在 flutter {} 块之后添加 dependencies 块（如果还没有的话）
if 'coreLibraryDesugaring' not in content:
    content = content.rstrip()
    content += '''
dependencies {
    coreLibraryDesugaring(\"com.android.tools:desugar_jdk_libs:2.1.4\")
}
'''
with open('$BUILD', 'w') as f:
    f.write(content)
"
          echo "=== Patched build.gradle.kts ==="
          cat "$BUILD"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: liaoleme-release
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: liaoleme-release

      - name: Get current date
        id: date
        run: echo "date=$(date +'v%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: "撸了么 ${{ steps.date.outputs.date }}"
          files: app-release.apk
          generate_release_notes: true
