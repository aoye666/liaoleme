name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: stable

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create . --platforms android --project-name liaoleme --org com.example

      - name: Patch Android build config
        run: |
          # 修复 NDK 版本（插件要求 27.0.12077973）
          sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts
          # 启用 core library desugaring（flutter_local_notifications 需要）
          sed -i '/compileOptions {/a\        isCoreLibraryDesugaringEnabled = true' android/app/build.gradle.kts
          # 添加 desugar 依赖
          sed -i '/dependencies {/a\    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' android/app/build.gradle.kts
          echo "=== Patched build.gradle.kts ==="
          cat android/app/build.gradle.kts

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: liaoleme-release
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: liaoleme-release

      - name: Get current date
        id: date
        run: echo "date=$(date +'v%Y.%m.%d.%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: "撸了么 ${{ steps.date.outputs.date }}"
          files: app-release.apk
          generate_release_notes: true
