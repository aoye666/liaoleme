name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PATH: liaoleme.jks
      KEYSTORE_PASSWORD: ${{ secrets.LIAOLEME_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.LIAOLEME_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.LIAOLEME_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create . --platforms android --project-name liaoleme --org com.example

      - name: Fix Android build config
        run: python3 fix_android.py

      - name: Setup signing keystore
        run: echo "${{ secrets.LIAOLEME_KEYSTORE }}" | base64 -d > android/app/liaoleme.jks

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v7
        with:
          name: liaoleme-release
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: liaoleme-release

      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 撸了么 v${{ steps.version.outputs.version }}
          files: app-release.apk
          generate_release_notes: true