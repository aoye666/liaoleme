name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable

      - name: Regenerate Android folder
        run: |
          rm -rf android
          flutter create . --platforms android --project-name liaoleme --org com.example

      - name: Fix build config with Python
        run: |
          python3 << 'PYEOF'
import re

with open("android/app/build.gradle.kts", "r") as f:
    content = f.read()

# Fix ndkVersion
content = content.replace(
    'ndkVersion = flutter.ndkVersion',
    'ndkVersion = "27.0.12077973"'
)

# Add isCoreLibraryDesugaringEnabled to compileOptions
content = content.replace(
    'compileOptions {',
    'compileOptions {\n    isCoreLibraryDesugaringEnabled = true'
)

# Add dependencies block at the end if not present
if "coreLibraryDesugaring" not in content:
    content += """
dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
}
"""

with open("android/app/build.gradle.kts", "w") as f:
    f.write(content)

print("=== Patched build.gradle.kts ===")
print(open("android/app/build.gradle.kts").read())
PYEOF

      - run: flutter pub get

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: liaoleme-release
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: liaoleme-release

      - name: Tag & Release
        id: date
        run: echo "date=v$(date +%Y.%m.%d.%H%M)" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: 撸了么 ${{ steps.date.outputs.date }}
          files: app-release.apk
          generate_release_notes: true
