name: liaoleme
description: "录了么 - 每日打卡自控助手"
publish_to: 'none'
version: 1.2.2+5

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  fl_chart: ^0.70.2
  shared_preferences: ^2.3.3
  flutter_local_notifications: ^19.5.0
  intl: ^0.20.2
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon.png"
  remove_alpha_ios: true